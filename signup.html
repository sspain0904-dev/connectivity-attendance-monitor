<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up</title>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #020408;
      color: #e2e8f0;
    }

    .card {
      background: #0a0f1a;
      padding: 2.25rem;
      border-radius: 14px;
      border: 1px solid #1e2d40;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 25px 60px rgba(0,0,0,.6);
    }

    h2 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: .4rem;
      text-align: center;
    }

    .subtitle {
      text-align: center;
      font-size: .82rem;
      color: #4a5568;
      margin-bottom: 1.75rem;
    }

    label {
      display: block;
      font-size: .72rem;
      font-weight: 600;
      color: #4a5568;
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: .35rem;
    }

    .field { margin-bottom: 1rem; }

    input, select {
      width: 100%;
      padding: .65rem .875rem;
      background: #020408;
      border: 1px solid #1e2d40;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: .85rem;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color .15s;
    }

    input::placeholder { color: #4a5568; }
    input:focus, select:focus { border-color: #7c3aed; }
    select option { background: #0a0f1a; }

    button {
      width: 100%;
      padding: .75rem;
      background: rgba(124,58,237,.15);
      color: #a78bfa;
      border: 1px solid rgba(124,58,237,.3);
      border-radius: 8px;
      font-size: .88rem;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: background .15s;
      margin-top: .5rem;
    }

    button:hover { background: rgba(124,58,237,.28); }

    #message {
      margin-top: 1rem;
      text-align: center;
      font-size: .82rem;
    }

    .error   { color: #ff3b5c; }
    .success { color: #00ff88; }

    p {
      text-align: center;
      margin-top: 1.25rem;
      font-size: .82rem;
      color: #4a5568;
    }

    a { color: #a78bfa; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="card">
    <h2>Create Account</h2>
    <div class="subtitle">Internet Monitor — sign up to get started</div>

    <div class="field">
      <label>Full Name</label>
      <input type="text" id="fullname" placeholder="e.g. Juan dela Cruz" />
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@email.com" />
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="Min. 6 characters" />
    </div>
    <div class="field">
      <label>Role</label>
      <select id="role">
        <option value="student">Student</option>
        <option value="teacher">Teacher</option>
      </select>
    </div>

    <button onclick="handleSignUp()">Sign Up</button>

    <div id="message"></div>

    <p>Already have an account? <a href="login.html">Log in</a></p>
  </div>

  <script>
    // 🔴 REPLACE THESE WITH YOUR ACTUAL SUPABASE CREDENTIALS
    const SUPABASE_URL = 'https://lxsiqkdlpknjevrebfhe.supabase.co'
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx4c2lxa2RscGtuamV2cmViZmhlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNTAwMjQsImV4cCI6MjA4NzkyNjAyNH0.RCm76GmFOJxqwQFQmu9ZD-uNs2zJeyYZvH9tXN3rqP0'

    const { createClient } = supabase
    const client = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

    async function handleSignUp() {
      const fullName = document.getElementById('fullname').value.trim()
      const email    = document.getElementById('email').value.trim()
      const password = document.getElementById('password').value
      const role     = document.getElementById('role').value
      const message  = document.getElementById('message')

      if (!fullName || !email || !password) {
        message.className = 'error'
        message.textContent = 'Please fill in all fields.'
        return
      }

      const { data, error } = await client.auth.signUp({
        email,
        password,
        options: {
          data: {
            full_name: fullName,
            role: role
          }
        }
      })

      if (error) {
        message.className = 'error'
        message.textContent = error.message
      } else {
        message.className = 'success'
        message.textContent = 'Account created! Check your email to confirm.'
      }
    }
  </script>

</body>
</html>
